 .membrane-sim {
    position: relative;
    height: 250px;
    background: #f5f5f4;
    overflow: hidden;
    border-radius: 1rem;
}

.molecule {
    position: absolute;
    border-radius: 50%;

}

.m-small {
    width: 8px;
    height: 8px;
    background: #3b82f6; /* ლურჯი - წყალი/სპირტი */

    height: 18px;

    box-shadow: 0 0 12px rgba(159, 18, 57, 0.3);
}

@keyframes passThrough {
    0% { left: -5%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { left: 105%; opacity: 0; }
}

@keyframes bounceBack {
    0% { left: -5%; opacity: 0; }
    10% { opacity: 1; }
    40% { left: 30%; opacity: 1; } /* ჩერდება მემბრანასთან */
    50% { left: 28%; opacity: 1; } /* მცირე უკუგდება */
    100% { left: 30%; opacity: 0; }
}

.m-small { 
    width: 8px; 
    height: 8px; 
    background: #3b82f6; 
    position: absolute;
    animation: passThrough linear infinite; 
    z-index: 20;
}

.m-large {

    position: absolute;

        mol.className = `molecule ${isSmall ? 'm-small' : 'm-large'}`;
        
        // შემთხვევითი სიმაღლე
        mol.style.top = Math.random() * 80 + 10 + '%';
        mol.style.left = '-10px';
        
        // ინდივიდუალური სიჩქარე და დაყოვნება
        const duration = isSmall ? (2 + Math.random() * 2) : (1.5 + Math.random());
        const delay = Math.random() * 3;
        
        mol.style.animationDuration = duration + 's';
        mol.style.animationDelay = delay + 's';
        
        container.appendChild(mol);
